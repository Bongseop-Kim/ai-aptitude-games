name: EAS Build (manual)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile (android-internal | ios-simulator | staging | production)
        required: true
        default: android-internal

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_NO_TELEMETRY: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Login to Expo (token)
        run: npx expo login --token "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Trigger build
        run: |
          PROFILE="${{ github.event.inputs.profile }}"
          echo "Building with profile: $PROFILE"
          eas build --non-interactive --platform all --profile "$PROFILE"

      - name: Show builds
        if: always()
        run: eas build:list --limit 10

