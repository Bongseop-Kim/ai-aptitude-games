name: EAS Manual Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: EAS update channel
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      message:
        description: Update message
        required: true
        default: Manual OTA update from GitHub Actions

jobs:
  eas-update:
    runs-on: ubuntu-latest
    env:
      CI: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_NO_TELEMETRY: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: eas update --non-interactive --channel "${{ inputs.channel }}" --message "${{ inputs.message }}"
