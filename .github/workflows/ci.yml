name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    # Keep this check name stable; main branch protection requires `build-and-test`.
    name: build-and-test
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Expo Doctor
        run: npx expo-doctor
